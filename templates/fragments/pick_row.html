<div id="pick-row-{{ schedella_id }}-{{ pick_idx }}"
     class="card flex items-center justify-between gap-3 border-[#f59e0b]/40">
  <div class="flex-1 min-w-0">
    <div class="text-xs text-[#78716c]">{{ match.match_date }}</div>
    <div class="text-sm font-medium truncate">{{ match.match_name }}</div>
  </div>
  <div class="flex items-center gap-2">
    <span class="badge-pron text-base font-bold px-3 py-1">{{ result.pronostico|upper }}</span>
    <span class="text-[#78716c] text-xs">{% if result.raw_odds is not none %}{{ result.raw_odds }}x{% endif %}</span>
  </div>
</div>
