{% extends "base.html" %}
{% set active = "nuova" %}
{% block title %}Nuova Schedella{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-[#f59e0b] mb-6">Nuova Schedella</h1>

<form method="post" action="/nuova" enctype="multipart/form-data" class="space-y-4">
  <div class="card">
    <h2 class="text-[#f59e0b] font-semibold mb-3">&#x1F4C1; File Excel</h2>
    <label class="block border-2 border-dashed border-[#2d2410] rounded-lg p-12 text-center cursor-pointer hover:border-[#f59e0b] transition-colors"
           id="drop-zone">
      <input type="file" name="excel_file" accept=".xlsx,.xls" required class="hidden" id="file-input"
             onchange="document.getElementById('file-name').textContent = this.files[0]?.name || ''">
      <div class="text-4xl mb-3">&#x1F4C2;</div>
      <div class="text-[#92400e]">Trascina il file Excel qui o clicca per selezionarlo</div>
      <div id="file-name" class="text-[#f59e0b] mt-2 text-sm font-medium"></div>
    </label>
  </div>

  <button type="submit" class="btn-gold w-full py-3 text-base">Avanti &#x2192;</button>
</form>
{% endblock %}

{% block scripts %}
<script>
  const zone = document.getElementById('drop-zone');
  const inp  = document.getElementById('file-input');
  if (zone) {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('border-[#f59e0b]'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('border-[#f59e0b]'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('border-[#f59e0b]');
      if (e.dataTransfer.files[0]) {
        inp.files = e.dataTransfer.files;
        document.getElementById('file-name').textContent = e.dataTransfer.files[0].name;
      }
    });
  }
</script>
{% endblock %}
